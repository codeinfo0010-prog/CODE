<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>|π|</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Criptografia Avancada</h1>
            <p class="subtitle">Combine multiplas cifras classicas</p>
        </header>

        <div class="card">
            <div class="section-title">Configurar Cifras (ordem de aplicacao)</div>
            
            <div class="cipher-list" id="cipherList"></div>

            <div class="cipher-selector">
                <select id="cipherSelect">
                    <option value="">Adicionar cifra...</option>
                    <option value="cesar">Cesar (deslocamento)</option>
                    <option value="atbash">Atbash (inversao)</option>
                    <option value="rot13">ROT13</option>
                    <option value="affine">Affine (ax+b)</option>
                    <option value="vigenere">Vigenere (senha)</option>
                    <option value="playfair">Playfair (matriz)</option>
                    <option value="railfence">Rail Fence (trilhos)</option>
                    <option value="binary">Binario (8 bits)</option>
                    <option value="symbols">Simbolos (personalizado)</option>
                </select>
                <button class="btn-add" onclick="addCipher()">+ Adicionar</button>
            </div>

            <button class="btn-clear" onclick="clearCiphers()">Limpar todas</button>
        </div>

        <div class="card">
            <div class="section-title">Texto</div>
            
            <div class="mode-toggle">
                <div class="mode-slider" id="modeSlider"></div>
                <button class="mode-btn active" onclick="setMode('encrypt')">Criptografar</button>
                <button class="mode-btn" onclick="setMode('decrypt')">Descriptografar</button>
            </div>

            <div class="input-group">
                <label id="inputLabel">Texto para criptografar</label>
                <textarea id="inputText" rows="4" placeholder="Digite seu texto aqui..."></textarea>
            </div>

            <button class="process-btn" onclick="process()">Processar</button>
        </div>

        <div class="card result-card" id="resultCard" style="display: none;">
            <div class="section-title">Resultado</div>
            
            <div class="result-box">
                <div class="result-header">
                    <span>Texto final</span>
                    <button class="copy-btn" onclick="copyResult()">Copiar</button>
                </div>
                <div class="result-text" id="resultText"></div>
            </div>

            <div class="steps-section" id="stepsSection">
                <div class="section-title">Etapas do processo</div>
                <div id="stepsList"></div>
            </div>
        </div>
    </div>

    <script src="ciphers.js"></script>
    <script src="script.js"></script>
</body>
</html>
